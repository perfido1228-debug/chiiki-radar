name: Purge old data

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Purge old (> 2 years)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npx tsx -e "import('./scripts/lib/supabase').then(async ({sb}) => { const { error } = await sb.rpc('purge_old_data'); if (error) throw error; console.log('purged'); })"
