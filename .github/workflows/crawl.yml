name: Crawl sources

on:
  schedule:
    # GitHubのscheduleは高負荷時に無音スキップされる。毎時00分は最も混雑し
    # 落とされやすいため、混雑しない分(:17/:47)に2回/時で冗長化してgapを縮める。
    # クロールは既存URLスキップで冪等なので二重発火しても安全。
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:

# 前のcrawlが走行中に次が発火しても積み上がらないよう直列化（実行中は待たせる）
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Run crawler
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npx tsx scripts/crawl.ts
